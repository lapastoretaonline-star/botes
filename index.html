<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=512, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 256px;
  height: 512px;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
}

.pantalla {
  position: absolute;
  width: 256px;
  height: 512px;
  opacity: 0;
  animation: rotar 48s infinite;
  text-align: center;
}

.pantalla:nth-child(1) { animation-delay: 0s; }
.pantalla:nth-child(2) { animation-delay: 6s; }
.pantalla:nth-child(3) { animation-delay: 12s; }
.pantalla:nth-child(4) { animation-delay: 18s; }
.pantalla:nth-child(5) { animation-delay: 24s; }
.pantalla:nth-child(6) { animation-delay: 30s; }
.pantalla:nth-child(7) { animation-delay: 36s; }
.pantalla:nth-child(8) { animation-delay: 42s; }

@keyframes rotar {
  0% { opacity: 0; }
  5% { opacity: 1; }
  12% { opacity: 1; }
  17% { opacity: 0; }
  100% { opacity: 0; }
}

.contenido {
  position: absolute;
  top: 48%;
  left: 50%;
  width: 220px;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  width: 126px;
  max-height: 78px;
  object-fit: contain;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.45));
}

.juego {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 22px;
  color: #fff;
  letter-spacing: 1px;
}

.label {
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 18px;
  letter-spacing: 3px;
  color: #fff;
}

.bote {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 2px;
}

.cifra {
  font-size: 64px;
  font-weight: 900;
  line-height: 0.9;
  color: #fff;
  text-shadow: 0 0 16px rgba(255,255,255,0.75);
}

.cifra-small {
  font-size: 38px;
  font-weight: 900;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 16px rgba(255,255,255,0.75);
  white-space: nowrap;
}

.millones {
  font-size: 18px;
  font-weight: 900;
  margin-top: 10px;
  letter-spacing: 4px;
  color: #fff;
}

.eurodreams-texto {
  font-size: 38px;
  font-weight: 900;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 16px rgba(255,255,255,0.75);
  white-space: nowrap;
}

.eurodreams-sub {
  font-size: 17px;
  font-weight: 900;
  margin-top: 10px;
  letter-spacing: 3px;
  color: #fff;
}

.web {
  position: absolute;
  bottom: 16px;
  width: 100%;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fff;
  opacity: 0.85;
}

.bonoloto { background: linear-gradient(160deg, #778926, #2f350e); }
.primitiva { background: linear-gradient(160deg, #09873D, #022b14); }
.quiniela { background: linear-gradient(160deg, #CB1517, #3a0506); }
.gordo { background: linear-gradient(160deg, #DC3F47, #3a0a0e); }
.quinigol { background: linear-gradient(160deg, #40BCCF, #0c2d33); }
.lototurf { background: linear-gradient(160deg, #ED691F, #3a1604); }
.eurodreams { background: linear-gradient(160deg, #6E368C, #1a0b22); }
.euromillones { background: linear-gradient(160deg, #003968, #000c1a); }

.pantalla::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 28%, rgba(255,255,255,0.25), transparent 35%),
    radial-gradient(circle at 50% 82%, rgba(255,255,255,0.12), transparent 50%);
  pointer-events: none;
}
</style>
</head>

<body>

<div class="pantalla bonoloto">
  <div class="contenido">
    <img src="logo-bonoloto-blanco.png" class="logo">
    <div class="juego">BONOLOTO</div>
    <div class="label">BOTE</div>
    <div class="bote" id="bonoloto"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla primitiva">
  <div class="contenido">
    <img src="logo-primitiva-blanco.png" class="logo">
    <div class="juego">LA PRIMITIVA</div>
    <div class="label">BOTE</div>
    <div class="bote" id="primitiva"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla quiniela">
  <div class="contenido">
    <img src="logo-quiniela-blanco.png" class="logo">
    <div class="juego">LA QUINIELA</div>
    <div class="label">BOTE</div>
    <div class="bote" id="quiniela"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla gordo">
  <div class="contenido">
    <img src="logo-el-gordo-blanco.png" class="logo">
    <div class="juego">EL GORDO</div>
    <div class="label">BOTE</div>
    <div class="bote" id="gordo"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla quinigol">
  <div class="contenido">
    <img src="logo-quinigol-blanco.png" class="logo">
    <div class="juego">EL QUINIGOL</div>
    <div class="label">BOTE</div>
    <div class="bote" id="quinigol"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla lototurf">
  <div class="contenido">
    <img src="logo-lototurf-blanco.png" class="logo">
    <div class="juego">LOTOTURF</div>
    <div class="label">BOTE</div>
    <div class="bote" id="lototurf"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla eurodreams">
  <div class="contenido">
    <img src="logo-eurodreams-blanco.png" class="logo">
    <div class="juego">EURODREAMS</div>
    <div class="label">BOTE</div>
    <div class="bote" id="eurodreams"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<div class="pantalla euromillones">
  <div class="contenido">
    <img src="logo-euromillones-blanco.png" class="logo">
    <div class="juego">EUROMILLONES</div>
    <div class="label">BOTE</div>
    <div class="bote" id="euromillones"></div>
  </div>
  <div class="web">www.lapastoreta.com</div>
</div>

<script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbx_sux9HLbZsxVhlu-O3r4xKHLQ-FQLTmI95dosV2bdX0MmfCocDfm4k1wD-xvzV_X9IQ/exec";

function formatearBote(valor, juego) {
  if (!valor) return "";

  if (juego === "eurodreams") {
    return `
      <div class="eurodreams-texto">30.000 €</div>
      <div class="eurodreams-sub">AL MES</div>
    `;
  }

  let limpio = String(valor)
    .replace(/\./g, "")
    .replace(",00", "")
    .replace("€", "")
    .replace(/\s/g, "");

  let num = parseInt(limpio, 10);

  if (isNaN(num)) return valor;

  if (num >= 1000000) {
    let millones = num / 1000000;
    let cifra = millones.toLocaleString("es-ES", { maximumFractionDigits: 1 });

    return `
      <div class="cifra">${cifra}</div>
      <div class="millones">MILLONES</div>
    `;
  }

  return `<div class="cifra-small">${num.toLocaleString("es-ES")} €</div>`;
}

function pintarBotes(datos) {
  Object.keys(datos).forEach(k => {
    const el = document.getElementById(k);
    if (el) el.innerHTML = formatearBote(datos[k], k);
  });
}

function cargarDatos() {
  const viejo = document.getElementById("jsonp");
  if (viejo) viejo.remove();

  const s = document.createElement("script");
  s.id = "jsonp";
  s.src = URL_APPS_SCRIPT + "?callback=pintarBotes&t=" + Date.now();
  document.body.appendChild(s);
}

cargarDatos();
setInterval(cargarDatos, 300000);
</script>

</body>
</html>
