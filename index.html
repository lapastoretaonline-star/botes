<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=512, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 256px;
  height: 512px;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
}

.pantalla {
  position: absolute;
  width: 256px;
  height: 512px;
  opacity: 0;
  display: none;
  animation: rotar 48s infinite;
  text-align: center;
}

.pantalla:nth-child(1) { animation-delay: 0s; }
.pantalla:nth-child(2) { animation-delay: 6s; }
.pantalla:nth-child(3) { animation-delay: 12s; }
.pantalla:nth-child(4) { animation-delay: 18s; }
.pantalla:nth-child(5) { animation-delay: 24s; }
.pantalla:nth-child(6) { animation-delay: 30s; }
.pantalla:nth-child(7) { animation-delay: 36s; }
.pantalla:nth-child(8) { animation-delay: 42s; }

@keyframes rotar {
  0% { opacity: 0; }
  5% { opacity: 1; }
  12% { opacity: 1; }
  17% { opacity: 0; }
  100% { opacity: 0; }
}

.contenido {
  position: absolute;
  top: 48%;
  left: 50%;
  width: 220px;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  width: 126px;
  max-height: 78px;
  object-fit: contain;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.45));
}

.juego {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 22px;
  color: #fff;
}

.label {
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 18px;
  letter-spacing: 3px;
  color: #fff;
}

.bote {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.cifra {
  font-size: 64px;
  font-weight: 900;
  line-height: 0.9;
  color: #fff;
  text-shadow: 0 0 16px rgba(255,255,255,0.75);
}

.cifra-small {
  font-size: 38px;
  font-weight: 900;
  color: #fff;
  white-space: nowrap;
}

.millions {
  font-size: 18px;
  font-weight: 900;
  margin-top: 10px;
  letter-spacing: 4px;
  color: #fff;
}

.eurodreams-texto {
  font-size: 38px;
  font-weight: 900;
  color: #fff;
  white-space: nowrap;
}

.eurodreams-sub {
  font-size: 17px;
  font-weight: 900;
  margin-top: 8px;
  color: #fff;
}

.footer {
  position: absolute;
  bottom: 0;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
}

.web {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  opacity: 0.85;
}

.responsable {
  width: 100%;
  max-width: 256px;
  opacity: 0.95;
}

/* COLORES */
.euromillones { background: linear-gradient(160deg, #003968, #000c1a); }
.primitiva { background: linear-gradient(160deg, #09873D, #022b14); }
.gordo { background: linear-gradient(160deg, #DC3F47, #3a0a0e); }
.bonoloto { background: linear-gradient(160deg, #778926, #2f350e); }
.eurodreams { background: linear-gradient(160deg, #6E368C, #1a0b22); }
.quiniela { background: linear-gradient(160deg, #CB1517, #3a0506); }
.quinigol { background: linear-gradient(160deg, #40BCCF, #0c2d33); }
.lototurf { background: linear-gradient(160deg, #ED691F, #3a1604); }

.pantalla::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 28%, rgba(255,255,255,0.25), transparent 35%),
    radial-gradient(circle at 50% 82%, rgba(255,255,255,0.12), transparent 50%);
  pointer-events: none;
}
</style>
</head>

<body>

<div class="pantalla euromillones">

    <div class="juego">EUROMILLONES</div>

    <div class="bote" id="euromillones"></div>
  </div>
  <div class="footer">
    <div class="web">www.lapastoreta.com</div>

<div class="pantalla eurodreams">
  <div class="contenido">
    <img src="logo-eurodreams-blanco.png" class="logo">

  </div>
</div>

<script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbx_sux9HLbZsxVhlu-O3r4xKHLQ-FQLTmI95dosV2bdX0MmfCocDfm4k1wD-xvzV_X9IQ/exec";

function formatearBote(valor, juego) {
  if (!valor) return "";

  if (juego === "eurodreams") {
    return `
      <div class="eurodreams-texto">20.000 €</div>
      <div class="eurodreams-sub">AL MES</div>
    `;
  }

  let limpio = String(valor)
    .replace(/\./g, "")
    .replace(",00", "")
    .replace("€", "")
    .replace(/\s/g, "");

  let num = parseInt(limpio, 10);

  if (isNaN(num)) return valor;

  if (num >= 1000000) {
    let m = (num / 1000000).toLocaleString("es-ES", { maximumFractionDigits: 1 });
    return `
      <div class="cifra">${m}</div>
      <div class="millions">MILIONS</div>
    `;
  }

  return `<div class="cifra-small">${num.toLocaleString("es-ES")} €</div>`;
}

function tieneBote(valor, juego) {
  if (juego === "eurodreams") return true;

  if (!valor) return false;

  const texto = String(valor).toLowerCase();

  if (
    texto.includes("sin dato") ||
    texto.includes("no encontrado") ||
    texto.includes("no hay bote") ||
    texto.trim() === ""
  ) {
    return false;
  }

  return true;
}

function pintarBotes(datos) {
  const pantallas = document.querySelectorAll(".pantalla");
  const activas = [];

  pantallas.forEach(pantalla => {
    const bote = pantalla.querySelector(".bote");
    if (!bote) return;

    const juego = bote.id;
    const valor = datos[juego];

    if (tieneBote(valor, juego)) {
      bote.innerHTML = formatearBote(valor, juego);
      pantalla.style.display = "block";
      activas.push(pantalla);
    } else {
      pantalla.style.display = "none";
    }
  });

  const duracionPorPantalla = 6;
  const duracionTotal = activas.length * duracionPorPantalla;

  activas.forEach((pantalla, index) => {
    pantalla.style.animation = `rotar ${duracionTotal}s infinite`;
    pantalla.style.animationDelay = `${index * duracionPorPantalla}s`;
  });
}

function cargarDatos() {
  const viejo = document.getElementById("jsonp");
  if (viejo) viejo.remove();

  const s = document.createElement("script");
  s.id = "jsonp";
  s.src = URL_APPS_SCRIPT + "?callback=pintarBotes&t=" + Date.now();
  document.body.appendChild(s);
}

cargarDatos();
setInterval(cargarDatos, 300000);
</script>

</body>
</html>
