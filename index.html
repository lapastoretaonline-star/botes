<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=256, height=512, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 256px;
  height: 512px;
  overflow: hidden;
  background: #000;
  font-family: Arial, Helvetica, sans-serif;
}

.pantalla {
  position: absolute;
  width: 256px;
  height: 512px;
  opacity: 0;
  animation: rotar 48s infinite;
  text-align: center;
}

/* ROTACIÓN */
.pantalla:nth-child(1) { animation-delay: 0s; }
.pantalla:nth-child(2) { animation-delay: 6s; }
.pantalla:nth-child(3) { animation-delay: 12s; }
.pantalla:nth-child(4) { animation-delay: 18s; }
.pantalla:nth-child(5) { animation-delay: 24s; }
.pantalla:nth-child(6) { animation-delay: 30s; }
.pantalla:nth-child(7) { animation-delay: 36s; }
.pantalla:nth-child(8) { animation-delay: 42s; }

@keyframes rotar {
  0% { opacity: 0; }
  5% { opacity: 1; }
  12% { opacity: 1; }
  17% { opacity: 0; }
  100% { opacity: 0; }
}

/* CONTENIDO */
.contenido {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 240px;
  transform: translate(-50%, -50%);
}

/* LOGOS */
.logo {
  width: 130px;
  max-height: 90px;
  object-fit: contain;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
}

/* TEXTO */
.label {
  font-size: 15px;
  margin-bottom: 10px;
  color: #fff;
}

.bote {
  font-size: 30px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 14px rgba(255,255,255,0.7);
}

.mensaje {
  font-size: 18px;
  margin-top: 14px;
  color: #fff;
}

.web {
  position: absolute;
  bottom: 18px;
  width: 100%;
  font-size: 26px;
  font-weight: 900;
  color: #fff;
}

/* 🎨 COLORES */
.bonoloto { background: linear-gradient(160deg, #778926, #2f350e); }
.primitiva { background: linear-gradient(160deg, #09873D, #022b14); }
.quiniela { background: linear-gradient(160deg, #CB1517, #3a0506); }
.gordo { background: linear-gradient(160deg, #DC3F47, #3a0a0e); }
.quinigol { background: linear-gradient(160deg, #40BCCF, #0c2d33); }
.lototurf { background: linear-gradient(160deg, #ED691F, #3a1604); }
.eurodreams { background: linear-gradient(160deg, #6E368C, #1a0b22); }
.euromillones { background: linear-gradient(160deg, #003968, #000c1a); }

/* BRILLO */
.pantalla::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 30%, rgba(255,255,255,0.25), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.12), transparent 50%);
}
</style>
</head>

<body>

<!-- BONOLOTO -->
<div class="pantalla bonoloto">
  <div class="contenido">
    <img src="logo-bonoloto-blanco.png" class="logo">
    <div class="label">Bote</div>
    <div class="bote" id="bonoloto"></div>
  </div>
  <div class="web">lapastoreta.com</div>
</div>

<!-- PRIMITIVA -->
<div class="pantalla primitiva">
  <div class="contenido">
    <img src="logo-primitiva-blanco.png" class="logo">
    <div class="label">Bote</div>
    <div class="bote" id="primitiva"></div>
  </div>
</div>

<!-- QUINIELA -->
<div class="pantalla quiniela">
  <div class="contenido">
    <img src="logo-quiniela-blanco.png" class="logo">
    <div class="label">Premio</div>
    <div class="bote" id="quiniela"></div>
  </div>
</div>

<!-- GORDO -->
<div class="pantalla gordo">
  <div class="contenido">
    <img src="logo-el-gordo-blanco.png" class="logo">
    <div class="label">Bote</div>
    <div class="bote" id="gordo"></div>
  </div>
</div>

<!-- QUINIGOL -->
<div class="pantalla quinigol">
  <div class="contenido">
    <img src="logo-quinigol-blanco.png" class="logo">
    <div class="label">Premio</div>
    <div class="bote" id="quinigol"></div>
  </div>
</div>

<!-- LOTOTURF -->
<div class="pantalla lototurf">
  <div class="contenido">
    <img src="logo-lototurf-blanco.png" class="logo">
    <div class="label">Bote</div>
    <div class="bote" id="lototurf"></div>
  </div>
</div>

<!-- EURODREAMS -->
<div class="pantalla eurodreams">
  <div class="contenido">
    <img src="logo-eurodreams-blanco.png" class="logo">
    <div class="label">Premio</div>
    <div class="bote" id="eurodreams"></div>
  </div>
</div>

<!-- EUROMILLONES -->
<div class="pantalla euromillones">
  <div class="contenido">
    <img src="logo-euromillones-blanco.png" class="logo">
    <div class="label">Bote</div>
    <div class="bote" id="euromillones"></div>
  </div>
</div>

<script>
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbx_sux9HLbZsxVhlu-O3r4xKHLQ-FQLTmI95dosV2bdX0MmfCocDfm4k1wD-xvzV_X9IQ/exec";

function formatearBote(valor) {
  if (!valor) return "";

  if (valor.includes("€/mes")) return valor;

  let limpio = valor.replace(/\./g,"").replace(",00","").replace("€","");
  let num = parseInt(limpio);

  if (isNaN(num)) return valor;

  if (num >= 1000000) {
    let m = num / 1000000;
    return m.toLocaleString("es-ES",{maximumFractionDigits:1}) + " MILLONES";
  }

  return num.toLocaleString("es-ES") + " €";
}

function pintarBotes(datos) {
  Object.keys(datos).forEach(k => {
    let el = document.getElementById(k);
    if (el) el.textContent = formatearBote(datos[k]);
  });
}

function cargarDatos() {
  let viejo = document.getElementById("jsonp");
  if (viejo) viejo.remove();

  let s = document.createElement("script");
  s.id = "jsonp";
  s.src = URL_APPS_SCRIPT + "?callback=pintarBotes&t=" + Date.now();
  document.body.appendChild(s);
}

cargarDatos();
setInterval(cargarDatos, 300000);
</script>

</body>
</html>
